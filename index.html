<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>VoxelCraft</title>
    <style>
      html, body { margin: 0; padding: 0; overflow: hidden; height: 100%; background: #000; }
      #app { width: 100%; height: 100%; }
      canvas { display: block; }
      .hud { position: fixed; font-family: 'Consolas', monospace; color: #fff; user-select: none; pointer-events: none; }
      #fps { top: 8px; left: 8px; font-size: 14px; text-shadow: 1px 1px 0 #000; }
      #debug {
        top: 32px; left: 8px; font-size: 13px; line-height: 1.45;
        background: rgba(0,0,0,0.45); padding: 8px 10px; border-radius: 4px;
      }
      #crosshair {
        position: fixed; top: 50%; left: 50%; width: 18px; height: 18px;
        transform: translate(-50%, -50%); pointer-events: none; mix-blend-mode: difference;
      }
      #crosshair::before, #crosshair::after {
        content: ''; position: absolute; background: #fff;
      }
      #crosshair::before { left: 8px; top: 0; width: 2px; height: 18px; }
      #crosshair::after { top: 8px; left: 0; width: 18px; height: 2px; }
      #hotbar {
        position: fixed; bottom: 12px; left: 50%; transform: translateX(-50%);
        display: flex; gap: 4px; padding: 4px; background: rgba(0,0,0,0.35);
        border-radius: 6px; user-select: none;
      }
      #hotbar .slot {
        position: relative; width: 48px; height: 48px; border: 2px solid #555;
        border-radius: 4px; background: rgba(20,20,20,0.6);
        display: flex; align-items: center; justify-content: center;
      }
      #hotbar .slot.active { border-color: #fff; background: rgba(60,60,60,0.7); }
      #hotbar .slot img { width: 36px; height: 36px; image-rendering: pixelated; }
      #hotbar .slot .num {
        position: absolute; top: 1px; left: 3px; font-size: 10px;
        font-family: 'Consolas', monospace; color: #ccc; text-shadow: 1px 1px 0 #000;
      }
      .slot .count {
        position: absolute; bottom: 1px; right: 3px; font-size: 13px; font-weight: bold;
        font-family: 'Consolas', monospace; color: #fff; text-shadow: 1px 1px 0 #000;
        pointer-events: none;
      }
      .slot .dura {
        position: absolute; bottom: 3px; left: 4px; right: 4px; height: 3px;
        background: rgba(0,0,0,0.7); border-radius: 1px; pointer-events: none;
      }
      .slot .dura div { height: 100%; border-radius: 1px; }
      #inv-screen {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: rgba(0,0,0,0.5); z-index: 9; font-family: 'Consolas', monospace;
      }
      #inv-screen .inv-panel {
        background: rgba(30,32,40,0.96); border: 1px solid #555; border-radius: 8px;
        padding: 14px 16px; display: flex; flex-direction: column; gap: 10px;
      }
      #inv-screen .inv-title { color: #ddd; font-size: 15px; }
      .craft-row { display: flex; align-items: center; gap: 14px; margin-bottom: 4px; }
      .craft-grid { display: grid; grid-template-columns: repeat(3, 44px); gap: 4px; }
      .craft-arrow { color: #aaa; font-size: 26px; }
      #inv-screen .result-slot { border-color: #7a7a3a; width: 52px; height: 52px; }
      .furnace-row { gap: 18px; }
      .furnace-io { display: flex; flex-direction: column; align-items: center; gap: 4px; }
      .furnace-flame {
        width: 14px; height: 18px; background: #2a2a30; border-radius: 2px;
        display: flex; flex-direction: column-reverse;
      }
      .furnace-flame div { width: 100%; background: linear-gradient(#ffd84a, #e8642a); border-radius: 2px; }
      .smelt-bar { width: 70px; height: 10px; background: #2a2a30; border-radius: 3px; }
      .smelt-bar div { height: 100%; background: #d8d8d8; border-radius: 3px; width: 0; }
      .inv-grid { display: grid; grid-template-columns: repeat(9, 44px); gap: 4px; }
      .inv-hotbar-row { margin-top: 6px; }
      #inv-screen .slot, .inv-palette .slot {
        position: relative; width: 44px; height: 44px; border: 2px solid #555;
        border-radius: 4px; background: rgba(18,18,22,0.8); cursor: pointer;
        display: flex; align-items: center; justify-content: center;
      }
      #inv-screen .slot:hover { border-color: #999; }
      #inv-screen .slot img, .inv-palette .slot img { width: 32px; height: 32px; image-rendering: pixelated; pointer-events: none; }
      .inv-tab {
        font-family: inherit; font-size: 12px; padding: 5px; cursor: pointer;
        background: #3a3f4b; color: #fff; border: 1px solid #555; border-radius: 4px;
      }
      .inv-palette {
        display: grid; grid-template-columns: repeat(9, 44px); gap: 4px;
        max-height: 150px; overflow-y: auto;
      }
      #inv-cursor {
        position: fixed; z-index: 20; pointer-events: none; width: 36px; height: 36px;
      }
      #inv-cursor img { width: 32px; height: 32px; image-rendering: pixelated; filter: drop-shadow(1px 2px 2px rgba(0,0,0,0.6)); }
      #stats-hud {
        position: fixed; bottom: 72px; left: 50%; transform: translateX(-50%);
        pointer-events: none; user-select: none;
      }
      .stat-top { display: flex; gap: 60px; justify-content: center; }
      .stat-row { display: flex; gap: 1px; font-size: 15px; }
      .stat-row.air { justify-content: flex-end; margin-bottom: 2px; color: #7db8e8; }
      .stat-row span { text-shadow: 1px 1px 1px #000; }
      .hearts .full { color: #e83a3a; }
      .hearts .half { color: #e83a3a; opacity: 0.55; }
      .hearts .empty { color: #3a3a3a; }
      .food .full { filter: none; }
      .food .half { filter: grayscale(0.5) brightness(0.85); }
      .food .empty { filter: grayscale(1) brightness(0.4); }
      .air .half { opacity: 0.5; }
      .air .empty { visibility: hidden; }
      #damage-flash {
        position: fixed; inset: 0; background: radial-gradient(ellipse at center, transparent 40%, #c00 130%);
        opacity: 0; pointer-events: none; z-index: 8; transition: opacity 0.1s;
      }
      #death-screen {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: rgba(120, 0, 0, 0.45); z-index: 11; font-family: 'Consolas', monospace;
      }
      .death-panel { text-align: center; color: #fff; }
      .death-panel h1 { font-size: 36px; text-shadow: 2px 2px 0 #000; }
      .death-panel button {
        font-family: inherit; font-size: 16px; padding: 10px 28px; cursor: pointer;
        background: #3a3f4b; color: #fff; border: 1px solid #777; border-radius: 5px;
      }
      #inv-cursor .count {
        position: absolute; bottom: -2px; right: -2px; font-size: 13px; font-weight: bold;
        font-family: 'Consolas', monospace; color: #fff; text-shadow: 1px 1px 0 #000;
      }
      #block-name {
        position: fixed; bottom: 76px; left: 50%; transform: translateX(-50%);
        font-family: 'Consolas', monospace; font-size: 15px; color: #fff;
        text-shadow: 1px 1px 0 #000; opacity: 0; transition: opacity 0.4s;
        pointer-events: none; user-select: none;
      }
      #menu {
        position: fixed; inset: 0; display: flex; align-items: center; justify-content: center;
        background: rgba(0, 0, 0, 0.55); font-family: 'Consolas', monospace; z-index: 10;
      }
      #menu .panel {
        background: rgba(24, 26, 32, 0.95); border: 1px solid #444; border-radius: 10px;
        padding: 22px 28px; width: 340px; color: #eee; display: flex; flex-direction: column; gap: 12px;
      }
      #menu h1 { margin: 0 0 4px; font-size: 26px; text-align: center; letter-spacing: 2px; }
      #menu button {
        font-family: inherit; font-size: 14px; padding: 8px 10px; cursor: pointer;
        background: #3a3f4b; color: #fff; border: 1px solid #555; border-radius: 5px;
      }
      #menu button:hover { background: #4a5160; }
      #menu button.danger { background: #5a2c2c; border-color: #804040; }
      #menu button.danger:hover { background: #74403a; }
      #menu .row { display: flex; flex-direction: column; gap: 5px; font-size: 13px; }
      #menu .row input[type=range] { width: 100%; }
      #menu .seed-row { flex-direction: row; }
      #menu .seed-row input {
        flex: 1; font-family: inherit; font-size: 13px; padding: 7px 8px;
        background: #1c1e24; color: #eee; border: 1px solid #555; border-radius: 5px;
      }
      #menu .btn-row { flex-direction: row; }
      #menu .btn-row button { flex: 1; }
      #menu .controls { font-size: 12px; color: #aaa; line-height: 1.7; text-align: center; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="fps" class="hud">FPS: --</div>
    <div id="crosshair"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
